# .github/workflows/openwrt-builder-n60por.yml
name: Build N60 Pro (n60por)

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/padavanonly/immortalwrt-mt798x-6.6
  REPO_BRANCH: openwrt-24.10-6.6
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  FIRMWARE_TAG: n60por-237-mt798x-6.6
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk gettext gcc-multilib g++-multilib git gnutls-dev gperf haveged help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses-dev libpython3-dev libreadline-dev libssl-dev libtool libyaml-dev libz-dev lld llvm lrzsz mkisofs msmtp nano ninja-build p7zip p7zip-full patch pkgconf python3 python3-pip python3-ply python3-docutils python3-pyelftools qemu-utils re2c rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev zstd
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: Clone source code
      working-directory: /workdir
      run: |
        df -hT $PWD
        git clone -b $REPO_BRANCH --single-branch --filter=blob:none $REPO_URL openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: Update feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Load and fix custom config
      run: |
        cd openwrt
        
        # 1. 复制用户配置（使用相对路径，避免重复）
        CONFIG_FILE="n60por/padavanonly-immortalwrt-mt798x-6.6.config"
        if [ -f "$GITHUB_WORKSPACE/$CONFIG_FILE" ]; then
          cp "$GITHUB_WORKSPACE/$CONFIG_FILE" .config
          echo "✅ Config copied from $CONFIG_FILE"
        else
          # 如果用户配置不存在，从上游模板复制
          echo "⚠️ User config not found, using upstream default"
          cp defconfig/nx60pro-ipailna-high-power.config .config
        fi
        
        # 2. 修复常见语法错误：删除行首空白、Tab、Windows换行符
        sed -i 's/^[ \t]*//; s/\r$//' .config
        
        # 3. 确保目标平台唯一且正确（删除所有旧的 TARGET 定义，重新写入）
        sed -i '/^CONFIG_TARGET_/d' .config
        cat >> .config << 'EOF'
CONFIG_TARGET_mediatek=y
CONFIG_TARGET_mediatek_filogic=y
CONFIG_TARGET_DEVICE_mediatek_filogic_DEVICE_netcore_n60-pro=y
# CONFIG_TARGET_MULTI_PROFILE is not set
EOF
        
        # 4. 强制清理任何残留的 x86 配置
        sed -i '/CONFIG_x86/d' .config
        sed -i '/CONFIG_M686/d' .config
        
        # 5. 重新生成配置
        make defconfig

    - name: Download package
      run: |
        cd openwrt
        make download -j8

    - name: Compile firmware
      id: compile
      continue-on-error: true
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) V=s
        echo "COMPILE_STATUS=success" >> $GITHUB_ENV

    - name: Check compile status
      if: env.COMPILE_STATUS != 'success'
      run: |
        echo "❌ 编译失败！"
        echo "请查看上方日志中的错误信息。"
        exit 1

    - name: Get firmware path
      id: firmware_path
      if: env.COMPILE_STATUS == 'success'
      run: |
        FIRMWARE_DIR="$GITHUB_WORKSPACE/openwrt/bin/targets/mediatek/filogic"
        if [ -d "$FIRMWARE_DIR" ]; then
          echo "FIRMWARE_DIR=$FIRMWARE_DIR" >> $GITHUB_ENV
          echo "FIRMWARE_EXISTS=true" >> $GITHUB_ENV
          echo "✅ Firmware directory found: $FIRMWARE_DIR"
        else
          echo "❌ Firmware directory not found: $FIRMWARE_DIR"
          echo "Available directories:"
          find "$GITHUB_WORKSPACE/openwrt/bin/targets" -type d 2>/dev/null || echo "No targets"
          echo "FIRMWARE_EXISTS=false" >> $GITHUB_ENV
          exit 1
        fi

    - name: Get device name
      id: device
      if: env.FIRMWARE_EXISTS == 'true'
      run: |
        cd openwrt
        DEVICE=$(grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' | head -1)
        [ -n "$DEVICE" ] && echo "DEVICE_NAME=_$DEVICE" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: Organize files
      if: env.FIRMWARE_EXISTS == 'true'
      run: |
        cd ${{ env.FIRMWARE_DIR }}
        rm -rf packages
        echo "✅ Firmware files:"
        ls -la

    - name: Upload firmware directory
      uses: actions/upload-artifact@main
      if: env.FIRMWARE_EXISTS == 'true'
      with:
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE_DIR }}

    - name: Generate release tag
      id: tag
      if: env.FIRMWARE_EXISTS == 'true' && env.UPLOAD_RELEASE == 'true'
      run: |
        echo "release_tag=$(date +"%Y.%m.%d-%H%M")-${{ env.FIRMWARE_TAG }}" >> $GITHUB_OUTPUT
        touch release.txt

    - name: Upload firmware to release
      uses: softprops/action-gh-release@master
      if: env.FIRMWARE_EXISTS == 'true' && env.UPLOAD_RELEASE == 'true'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: ${{ env.FIRMWARE_DIR }}/*

    - name: Delete workflow runs
      uses: Mattraks/delete-workflow-runs@main
      with:
        retain_days: 0
        keep_minimum_runs: 2
