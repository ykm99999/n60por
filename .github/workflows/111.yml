# .github/workflows/openwrt-builder-n60por.yml
name: Build N60 Pro (n60por)

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/padavanonly/immortalwrt-mt798x-6.6
  REPO_BRANCH: openwrt-24.10-6.6
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  FIRMWARE_TAG: n60por-237-mt798x-6.6
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk gettext gcc-multilib g++-multilib git gnutls-dev gperf haveged help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses-dev libpython3-dev libreadline-dev libssl-dev libtool libyaml-dev libz-dev lld llvm lrzsz mkisofs msmtp nano ninja-build p7zip p7zip-full patch pkgconf python3 python3-pip python3-ply python3-docutils python3-pyelftools qemu-utils re2c rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev zstd
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: Clone source code
      working-directory: /workdir
      run: |
        df -hT $PWD
        git clone -b $REPO_BRANCH --single-branch --filter=blob:none $REPO_URL openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: Update feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Generate clean config
      run: |
        cd openwrt
        
        # 使用上游已验证的模板
        if [ -f "defconfig/nx60pro-ipailna-high-power.config" ]; then
          cp defconfig/nx60pro-ipailna-high-power.config .config
          echo "✅ 使用上游模板: nx60pro-ipailna-high-power.config"
        else
          make defconfig
        fi
        
        # 修复换行符和行首空白
        sed -i 's/\r$//' .config
        sed -i 's/^[ \t]*//' .config
        sed -i '/CONFIG_x86/d' .config
        sed -i '/CONFIG_M686/d' .config
        
        # ===== 添加 Docker + SSR Plus+ （逐行 echo，禁用 EOF） =====
        echo "CONFIG_PACKAGE_kmod-cgroup-cpu=y" >> .config
        echo "CONFIG_PACKAGE_kmod-cgroup-cpuset=y" >> .config
        echo "CONFIG_PACKAGE_kmod-cgroup-freezer=y" >> .config
        echo "CONFIG_PACKAGE_kmod-cgroup-memory=y" >> .config
        echo "CONFIG_PACKAGE_kmod-veth=y" >> .config
        echo "CONFIG_PACKAGE_kmod-br-netfilter=y" >> .config
        echo "CONFIG_PACKAGE_kmod-overlay=y" >> .config
        echo "CONFIG_PACKAGE_kmod-lib-crc32c=y" >> .config
        echo "CONFIG_PACKAGE_cgroupfs-mount=y" >> .config
        echo "CONFIG_PACKAGE_docker-ce=y" >> .config
        echo "CONFIG_PACKAGE_dockerd=y" >> .config
        echo "CONFIG_PACKAGE_luci-app-dockerman=y" >> .config
        echo "CONFIG_PACKAGE_docker-compose=y" >> .config
        echo "CONFIG_PACKAGE_luci-app-ssr-plus=y" >> .config
        echo "CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_Xray=y" >> .config
        echo "CONFIG_PACKAGE_xray-core=y" >> .config
        echo "CONFIG_PACKAGE_kmod-tun=y" >> .config
        echo "CONFIG_PACKAGE_kmod-nft-tproxy=y" >> .config
        echo "CONFIG_PACKAGE_kmod-nft-socket=y" >> .config
        echo "CONFIG_PACKAGE_kmod-inet-diag=y" >> .config
        echo "CONFIG_PACKAGE_kmod-ipt-tproxy=y" >> .config
        echo "CONFIG_PACKAGE_kmod-ipt-nat=y" >> .config
        echo "CONFIG_PACKAGE_ipset=y" >> .config
        echo "CONFIG_PACKAGE_ip-full=y" >> .config
        echo "CONFIG_PACKAGE_libopenssl=y" >> .config
        echo "CONFIG_PACKAGE_libmbedtls=y" >> .config
        echo "CONFIG_PACKAGE_luci-app-turboacc-mtk=y" >> .config
        echo "CONFIG_PACKAGE_luci-i18n-turboacc-mtk-zh-cn=y" >> .config
        echo "CONFIG_MTK_WHNAT_SUPPORT=m" >> .config
        echo "CONFIG_MTK_WARP_V2=y" >> .config
        
        echo "=== 目标配置确认 ==="
        grep '^CONFIG_TARGET' .config
        grep '^CONFIG_PACKAGE_docker' .config | head -2
        grep '^CONFIG_PACKAGE_luci-app-ssr-plus' .config
        
        make defconfig

    - name: Download package
      run: |
        cd openwrt
        make download -j8

    - name: Compile firmware
      id: compile
      continue-on-error: true
      run: |
        cd openwrt
        echo "开始编译..."
        make -j$(nproc) V=s
        echo "COMPILE_STATUS=success" >> $GITHUB_ENV

    - name: Check compile status
      if: env.COMPILE_STATUS != 'success'
      run: |
        echo "❌ 编译失败！"
        exit 1

    - name: Get firmware path
      id: firmware_path
      if: env.COMPILE_STATUS == 'success'
      run: |
        FIRMWARE_DIR="$GITHUB_WORKSPACE/openwrt/bin/targets/mediatek/filogic"
        if [ -d "$FIRMWARE_DIR" ]; then
          echo "FIRMWARE_DIR=$FIRMWARE_DIR" >> $GITHUB_ENV
          echo "FIRMWARE_EXISTS=true" >> $GITHUB_ENV
          echo "✅ 固件目录: $FIRMWARE_DIR"
        else
          echo "❌ 固件目录不存在"
          exit 1
        fi

    - name: Get device name
      id: device
      if: env.FIRMWARE_EXISTS == 'true'
      run: |
        cd openwrt
        DEVICE=$(grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' | head -1)
        [ -n "$DEVICE" ] && echo "DEVICE_NAME=_$DEVICE" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: Organize files
      if: env.FIRMWARE_EXISTS == 'true'
      run: |
        cd ${{ env.FIRMWARE_DIR }}
        rm -rf packages
        echo "✅ 固件文件:"
        ls -la

    - name: Upload firmware directory
      uses: actions/upload-artifact@main
      if: env.FIRMWARE_EXISTS == 'true'
      with:
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE_DIR }}

    - name: Generate release tag
      id: tag
      if: env.FIRMWARE_EXISTS == 'true' && env.UPLOAD_RELEASE == 'true'
      run: |
        echo "release_tag=$(date +"%Y.%m.%d-%H%M")-${{ env.FIRMWARE_TAG }}" >> $GITHUB_OUTPUT
        touch release.txt

    - name: Upload firmware to release
      uses: softprops/action-gh-release@master
      if: env.FIRMWARE_EXISTS == 'true' && env.UPLOAD_RELEASE == 'true'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: ${{ env.FIRMWARE_DIR }}/*

    - name: Delete workflow runs
      uses: Mattraks/delete-workflow-runs@main
      with:
        retain_days: 0
        keep_minimum_runs: 2
