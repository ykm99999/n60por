# .github/workflows/sync-237-6.6.yml
name: Sync 237-6.6 Source to n60por

on:
  workflow_dispatch:        # 手动触发
  schedule:
    - cron: '0 0 * * 0'     # 每周日零点自动同步（可选）

env:
  SOURCE_REPO: https://github.com/moshanghuakai01/237-6.6.git
  SOURCE_BRANCH: main       # 如果该仓库默认分支不是 main，请修改
  TARGET_DIR: n60por        # 目标目录名

jobs:
  sync:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout your repository (target branch)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Remove existing target directory if any
        run: rm -rf ${{ env.TARGET_DIR }}

      - name: Clone source repository
        run: |
          git clone --depth 1 --branch ${{ env.SOURCE_BRANCH }} ${{ env.SOURCE_REPO }} ${{ env.TARGET_DIR }}

      - name: Remove .git from cloned source (avoid submodule issues)
        run: rm -rf ${{ env.TARGET_DIR }}/.git

      - name: Commit and push to your main branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ${{ env.TARGET_DIR }}
          git commit -m "chore: sync 237-6.6 source to n60por" || echo "No changes to commit"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
